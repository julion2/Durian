# Site
baseURL: "https://julion2.github.io/durian/"
title: "Durian"
locale: "en-us"
defaultContentLanguage: "en"
enableRobotsTXT: true
enableGitInfo: true

# Theme via Hugo Module
# Mounts let us serve existing docs/*.png files (referenced by the README and
# pkl examples) as static assets at /durian/... without keeping duplicate
# copies under docs/static/.
module:
  imports:
    - path: github.com/imfing/hextra
  mounts:
    - source: static
      target: static
    - source: assets
      target: assets
    - source: content
      target: content
    - source: i18n
      target: i18n
    - source: layouts
      target: layouts
    - source: logo.png
      target: static/logo.png
    - source: screenshot-light.png
      target: static/images/screenshot-light.png
    - source: screenshot-dark.png
      target: static/images/screenshot-dark.png
    - source: screenshot-compose.png
      target: static/images/screenshot-compose.png

# Markdown
markup:
  goldmark:
    renderer:
      unsafe: true   # allow raw HTML in markdown (Hextra shortcodes need this)
  highlight:
    noClasses: false # use CSS classes for code highlighting

# Output: enable JSON for built-in search
outputs:
  home: [HTML]
  page: [HTML]
  section: [HTML, RSS]

# Menu
menu:
  main:
    - identifier: docs
      name: Docs
      pageRef: /docs
      weight: 1
    - identifier: search
      name: Search
      weight: 2
      params:
        type: search
    - identifier: github
      url: https://github.com/julion2/durian
      weight: 3
      params:
        icon: github

# Hextra-specific config
params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: logo.png
      width: 28
      height: 28
  theme:
    default: system
    displayToggle: true
  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false
  editURL:
    enable: true
    base: "https://github.com/julion2/durian/edit/main/docs/content"
  toc:
    displayTags: true
  page:
    width: normal
