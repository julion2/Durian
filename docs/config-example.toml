# Durian Configuration Example
# Copy to ~/.config/durian/config.toml

[settings]
theme = "light"
notifications_enabled = true
load_remote_images = false

[sync]
auto_fetch_enabled = true
auto_fetch_interval = 120

[signatures]
default = "Best regards"
work = "Best regards,\nYour Name\nCompany Inc."

# Password auth (e.g. GMX, custom SMTP)
[[accounts]]
name = "Personal"
email = "you@example.com"
alias = "personal"  # Short alias for CLI: durian sync personal

[accounts.smtp]
host = "smtp.example.com"
port = 587
auth = "password"
max_attachment_size = "20MB"  # GMX limit is 20MB

[accounts.imap]
host = "imap.example.com"
port = 993
auth = "password"
max_messages = 5000  # Limit per mailbox, 0 = unlimited
# mailboxes = ["INBOX", "Sent", "Drafts"]  # Optional, has smart defaults

[accounts.auth]
username = "you@example.com"
password_keychain = "example-smtp"

# Microsoft 365 OAuth
[[accounts]]
name = "Work"
email = "you@company.com"
alias = "work"  # Short alias for CLI: durian sync work
default = true
default_signature = "work"
notifications = true  # Per-account override (omit to use global setting)

[accounts.smtp]
host = "smtp.office365.com"
port = 587
auth = "oauth2"
max_attachment_size = "25MB"  # Office 365 default, can be up to 150MB

[accounts.imap]
host = "outlook.office365.com"
port = 993
auth = "oauth2"
max_messages = 5000

[accounts.oauth]
provider = "microsoft"
# client_id = "custom-azure-client-id"  # Optional, built-in default is used if omitted

# Google OAuth
[[accounts]]
name = "Gmail"
email = "you@gmail.com"
alias = "gmail"  # Short alias for CLI: durian auth login gmail

[accounts.smtp]
host = "smtp.gmail.com"
port = 587
auth = "oauth2"
max_attachment_size = "25MB"  # Gmail limit is 25MB

[accounts.imap]
host = "imap.gmail.com"
port = 993
auth = "oauth2"
max_messages = 5000

[accounts.oauth]
provider = "google"
# client_id and client_secret are optional, built-in defaults are used if omitted
# client_id = "custom-google-client-id"
# client_secret = "custom-google-client-secret"
