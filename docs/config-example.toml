# Durian Configuration Example
# Copy to ~/.config/durian/config.toml (or $XDG_CONFIG_HOME/durian/config.toml)
# Remove the example accounts below and add your own.

[settings]
theme = "light"                   # "light", "dark", or "system"
notifications_enabled = true      # Global notification toggle
load_remote_images = false        # Block tracking pixels by default

[sync]
gui_auto_sync = true              # GUI auto-syncs on launch and periodically
auto_fetch_interval = 120         # Quick sync interval in seconds (GUI)
full_sync_interval = 7200         # Full sync interval in seconds (GUI)

# Optional: sync tags across machines via a self-hosted sync server.
# See docs/TAG_SYNC.md for setup instructions.
# [sync.tag_sync]
# url = "http://nas:8724"         # Sync server URL (e.g. Tailnet hostname)
# api_key = "your-secret"         # Shared API key

[signatures]
default = "Best regards"
work = """
<b>Your Name</b><br>
Position<br>
<b>Company Inc.</b><br>
<br>
Phone: +1 234 567 890<br>
Email: <a href="mailto:you@company.com">you@company.com</a><br>
Web: <a href="https://company.com">company.com</a>"""

# ── Password auth (e.g. GMX, Hostinger, LRZ) ──────────────────────────

[[accounts]]
name = "Personal"
email = "you@example.com"
display_name = "Your Name"        # Used in From header
alias = "personal"                # Short alias for CLI: durian sync personal
default_signature = "default"     # Signature key from [signatures]

[accounts.smtp]
host = "smtp.example.com"
port = 587                        # 587 = STARTTLS, 465 = implicit TLS
auth = "password"
max_attachment_size = "20MB"      # Optional, provider-specific limit

[accounts.imap]
host = "imap.example.com"
port = 993
auth = "password"
max_messages = 5000               # Max messages per mailbox, 0 = unlimited
# batch_size = 100               # Download batch size (default: 100)
# mailboxes = ["INBOX", "Sent"]  # Optional, auto-detected via SPECIAL-USE

[accounts.auth]
username = "you@example.com"       # IMAP/SMTP login username (if different from email)
# password_keychain = "custom-key" # Optional Keychain entry name (default: email)
# Then run: durian auth login personal

# ── Microsoft 365 OAuth ────────────────────────────────────────────────

[[accounts]]
name = "Work"
email = "you@company.com"
display_name = "Your Name"
alias = "work"
default = true                    # Default account for compose
default_signature = "work"
notifications = true              # Per-account notification override

[accounts.smtp]
host = "smtp.office365.com"
port = 587
auth = "oauth2"

[accounts.imap]
host = "outlook.office365.com"
port = 993
auth = "oauth2"
max_messages = 5000

[accounts.oauth]
provider = "microsoft"
# client_id = "your-azure-client-id"  # Optional, built-in default is used
# tenant = "common"                   # Azure AD tenant (default: "common")

# ── Microsoft 365 Shared Mailbox ───────────────────────────────────────

[[accounts]]
name = "Support"
email = "support@company.com"
display_name = "Company Support"
alias = "support"
auth_email = "you@company.com"   # Delegating user (must have Full Access + Send As)
default_signature = "work"
notifications = false

[accounts.smtp]
host = "smtp.office365.com"
port = 587
auth = "oauth2"

[accounts.imap]
host = "outlook.office365.com"
port = 993
auth = "oauth2"

[accounts.oauth]
provider = "microsoft"

# ── Google OAuth ───────────────────────────────────────────────────────

[[accounts]]
name = "Gmail"
email = "you@gmail.com"
alias = "gmail"

[accounts.smtp]
host = "smtp.gmail.com"
port = 587
auth = "oauth2"

[accounts.imap]
host = "imap.gmail.com"
port = 993
auth = "oauth2"
max_messages = 5000

[accounts.oauth]
provider = "google"
client_id = "your-google-client-id"         # Required, see docs/OAUTH_SETUP.md
client_secret = "your-google-client-secret"  # Required, see docs/OAUTH_SETUP.md
