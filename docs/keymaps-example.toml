# Durian Keymaps Configuration
# Copy to ~/.config/durian/keymaps.toml (or $XDG_CONFIG_HOME/durian/keymaps.toml)
# These are the defaults. Only include keymaps you want to change.
#
# All vim-style keybindings are fully configurable.
# sequence = true  → multi-key sequence (e.g. "gg", "dd", "gi")
# supports_count   → accepts count prefix (e.g. "5j" = move down 5)
# modifiers        → ["cmd"], ["ctrl"], ["shift"], or []
# context          → "list" (default), "search", "tag_picker", "thread", "compose_normal"

[global_settings]
keymaps_enabled = true
show_keymap_hints = true
sequence_timeout = 1.0            # seconds to wait for next key in sequence

# ── Navigation ─────────────────────────────────────────────────────────

[[keymaps]]
action = "next_email"
key = "j"
description = "Next email"

[[keymaps]]
action = "prev_email"
key = "k"
description = "Previous email"

[[keymaps]]
action = "first_email"
key = "gg"
sequence = true
description = "Jump to first email"

[[keymaps]]
action = "last_email"
key = "G"
description = "Jump to last email"

[[keymaps]]
action = "page_down"
key = "d"
modifiers = ["ctrl"]
supports_count = true
description = "Half-page down"

[[keymaps]]
action = "page_up"
key = "u"
modifiers = ["ctrl"]
supports_count = true
description = "Half-page up"

# ── Actions ────────────────────────────────────────────────────────────

[[keymaps]]
action = "archive"
key = "a"
description = "Archive email"

[[keymaps]]
action = "delete"
key = "dd"
sequence = true
description = "Delete email"

[[keymaps]]
action = "toggle_read"
key = "u"
description = "Toggle read/unread"

[[keymaps]]
action = "toggle_star"
key = "s"
description = "Toggle pin/star"

[[keymaps]]
action = "tag_picker"
key = "t"
description = "Open tag picker"

# ── Compose ────────────────────────────────────────────────────────────

[[keymaps]]
action = "compose"
key = "c"
description = "Compose new email"

[[keymaps]]
action = "reply"
key = "r"
description = "Reply"

[[keymaps]]
action = "reply_all"
key = "R"
description = "Reply all"

[[keymaps]]
action = "forward"
key = "f"
description = "Forward"

# ── Folder Navigation ──────────────────────────────────────────────────

[[keymaps]]
action = "go_inbox"
key = "gi"
sequence = true
description = "Go to inbox"

[[keymaps]]
action = "go_sent"
key = "gs"
sequence = true
description = "Go to sent"

[[keymaps]]
action = "go_drafts"
key = "gd"
sequence = true
description = "Go to drafts"

[[keymaps]]
action = "go_archive"
key = "ga"
sequence = true
description = "Go to archive"

# ── Search & UI ────────────────────────────────────────────────────────

[[keymaps]]
action = "search"
key = "/"
description = "Search emails"

[[keymaps]]
action = "close_detail"
key = "q"
description = "Close/back"

[[keymaps]]
action = "reload_inbox"
key = "r"
modifiers = ["cmd"]
description = "Reload inbox"

# ── Selection (Visual Mode) ───────────────────────────────────────────

[[keymaps]]
action = "enter_visual_mode"
key = "v"
description = "Enter visual mode"

[[keymaps]]
action = "enter_toggle_mode"
key = "V"
description = "Enter toggle visual mode"

[[keymaps]]
action = "toggle_selection"
key = " "
description = "Toggle current email in selection"

# ── Search Popup (context = "search") ────────────────────────────────
# These bindings are only active when the search popup is open.
# Arrow keys, Return, and Escape are always available (built-in).

[[keymaps]]
action = "select_next"
key = "j"
modifiers = ["ctrl"]
context = "search"
description = "Next search result"

[[keymaps]]
action = "select_prev"
key = "k"
modifiers = ["ctrl"]
context = "search"
description = "Previous search result"

[[keymaps]]
action = "select_next"
key = "n"
modifiers = ["ctrl"]
context = "search"
description = "Next search result (alt)"

[[keymaps]]
action = "select_prev"
key = "p"
modifiers = ["ctrl"]
context = "search"
description = "Previous search result (alt)"

# ── Tag Picker (context = "tag_picker") ──────────────────────────────

[[keymaps]]
action = "select_next"
key = "j"
modifiers = ["ctrl"]
context = "tag_picker"
description = "Next tag"

[[keymaps]]
action = "select_prev"
key = "k"
modifiers = ["ctrl"]
context = "tag_picker"
description = "Previous tag"

[[keymaps]]
action = "select_next"
key = "n"
modifiers = ["ctrl"]
context = "tag_picker"
description = "Next tag (alt)"

[[keymaps]]
action = "select_prev"
key = "p"
modifiers = ["ctrl"]
context = "tag_picker"
description = "Previous tag (alt)"

# ── Compose Vim Mode (context = "compose_normal") ────────────────────
# Configurable sequences to exit INSERT mode in the compose editor.
# Escape always works. These are additional shortcuts.

[[keymaps]]
action = "exit_insert"
key = "jk"
sequence = true
context = "compose_normal"
description = "Exit insert mode"

# To use "jj" instead, change key = "jj" or add another entry.

# ── Thread View (context = "thread") ─────────────────────────────────
# Active when thread/detail view is focused (enter with "l", exit with "h").

[[keymaps]]
action = "enter_thread"
key = "l"
description = "Enter thread view"

[[keymaps]]
action = "scroll_down"
key = "j"
context = "thread"
supports_count = true
description = "Scroll down (3j = 3x)"

[[keymaps]]
action = "scroll_up"
key = "k"
context = "thread"
supports_count = true
description = "Scroll up (3k = 3x)"

[[keymaps]]
action = "page_down"
key = "d"
modifiers = ["ctrl"]
context = "thread"
supports_count = true
description = "Half-page down in thread"

[[keymaps]]
action = "page_up"
key = "u"
modifiers = ["ctrl"]
context = "thread"
supports_count = true
description = "Half-page up in thread"

[[keymaps]]
action = "next_message"
key = "n"
context = "thread"
supports_count = true
description = "Next message in thread (3n = jump 3)"

[[keymaps]]
action = "prev_message"
key = "N"
context = "thread"
supports_count = true
description = "Previous message in thread (3N = jump 3)"

[[keymaps]]
action = "close_detail"
key = "h"
context = "thread"
description = "Back to email list"

[[keymaps]]
action = "reply"
key = "r"
context = "thread"
description = "Reply to email"
