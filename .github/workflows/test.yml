name: Test

on:
  pull_request:
    branches: [main]

jobs:
  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-cli-${{ hashFiles('MODULE.bazel', 'cli/go.mod', 'cli/go.sum') }}
          restore-keys: bazel-cli-

      - name: Test CLI
        run: bazel test //cli/... --test_output=errors

      - name: Test Sync Server
        run: bazel test //sync:sync_test --test_output=errors

      - name: Build CLI
        run: bazel build //cli/cmd/durian

      - name: Build Sync Server
        run: bazel build //sync:durian-sync

  gui:
    name: GUI (Swift)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-gui-${{ hashFiles('MODULE.bazel', 'gui/BUILD.bazel') }}
          restore-keys: bazel-gui-

      - name: Test
        run: bazel test //gui:ci_config_test //gui:ci_profile_test //gui:ci_banner_manager_test //gui:ci_model_test --test_output=errors
