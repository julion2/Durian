name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-cli-${{ hashFiles('MODULE.bazel', 'cli/go.mod', 'cli/go.sum') }}
          restore-keys: bazel-cli-

      - name: Test
        run: bazel test //cli/... --test_output=errors

      - name: Build
        run: bazel build //cli/cmd/durian

  gui:
    name: GUI (Swift)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-gui-${{ hashFiles('MODULE.bazel', 'gui/BUILD.bazel') }}
          restore-keys: bazel-gui-

      - name: Test
        run: bazel test //gui:config_test //gui:profile_test //gui:banner_manager_test //gui:model_test --test_output=errors
