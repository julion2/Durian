name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-cli-${{ hashFiles('MODULE.bazel', 'cli/go.mod', 'cli/go.sum') }}
          restore-keys: bazel-cli-

      - name: Test
        run: bazel test //cli/... --test_output=errors

      - name: Build
        run: bazel build //cli/cmd/durian

  # GUI tests require Xcode 26 (glassEffect API) but rules_swift test_discoverer
  # crashes on Xcode 26. Blocked until rules_swift supports Xcode 26.
  # See: https://github.com/bazelbuild/rules_swift/issues
