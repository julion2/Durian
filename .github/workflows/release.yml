name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build CLI (darwin-arm64)
        run: |
          mkdir -p dist
          bazel build //cli/cmd/durian
          cp bazel-bin/cli/cmd/durian/durian_/durian dist/durian-darwin-arm64

      - name: Build CLI (darwin-amd64)
        run: |
          bazel build //cli/cmd/durian --platforms=@rules_go//go/toolchain:darwin_amd64
          cp bazel-bin/cli/cmd/durian/durian_/durian dist/durian-darwin-amd64

      - name: Build GUI
        run: |
          bazel build -c opt --define ci=true //gui:Durian
          # Repack with correct timestamps (Bazel sets 1980-01-01 for reproducibility)
          cd /tmp && unzip -o $GITHUB_WORKSPACE/bazel-bin/gui/Durian.zip -d gui_repack
          find gui_repack -exec touch {} +
          cd gui_repack && zip -r $GITHUB_WORKSPACE/dist/Durian-${{ steps.version.outputs.version }}.zip Durian.app

      - name: Package
        run: |
          cd dist
          tar -czf durian-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz durian-darwin-arm64
          tar -czf durian-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz durian-darwin-amd64
          shasum -a 256 *.tar.gz *.zip > checksums.txt
          cat checksums.txt

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/durian-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz \
            dist/durian-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz \
            dist/Durian-${{ steps.version.outputs.version }}.zip \
            dist/checksums.txt \
            --title "Durian ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_ARM64=$(shasum -a 256 dist/durian-${VERSION}-darwin-arm64.tar.gz | cut -d' ' -f1)
          SHA_AMD64=$(shasum -a 256 dist/durian-${VERSION}-darwin-amd64.tar.gz | cut -d' ' -f1)
          SHA_GUI=$(shasum -a 256 dist/Durian-${VERSION}.zip | cut -d' ' -f1)

          git clone https://x-access-token:${GH_TOKEN}@github.com/julion2/homebrew-tap.git /tmp/tap
          cd /tmp/tap

          cat > Formula/durian.rb << FORMULA
          class Durian < Formula
            desc "Fast email client CLI - IMAP sync, SQLite store, HTTP API"
            homepage "https://github.com/julion2/Durian"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/julion2/Durian/releases/download/v\#{version}/durian-\#{version}-darwin-arm64.tar.gz"
                sha256 "${SHA_ARM64}"
              else
                url "https://github.com/julion2/Durian/releases/download/v\#{version}/durian-\#{version}-darwin-amd64.tar.gz"
                sha256 "${SHA_AMD64}"
              end
            end

            def install
              if Hardware::CPU.arm?
                bin.install "durian-darwin-arm64" => "durian"
              else
                bin.install "durian-darwin-amd64" => "durian"
              end
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/durian --version")
            end
          end
          FORMULA

          cat > Casks/durian.rb << CASK
          cask "durian" do
            version "${VERSION}"
            sha256 "${SHA_GUI}"

            url "https://github.com/julion2/Durian/releases/download/v\#{version}/Durian-\#{version}.zip"
            name "Durian"
            desc "macOS email client for power users"
            homepage "https://github.com/julion2/Durian"

            app "Durian.app"
          end
          CASK

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "bump durian to ${VERSION}" || true
          git push
