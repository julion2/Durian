openapi: 3.0.0
info:
  title: Durian API
  version: 1.0.0
servers:
  - url: http://localhost:9723/api/v1
paths:
  /search:
    get:
      summary: Search for emails
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: A list of emails
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
  /tags:
    get:
      summary: List all known tags
      responses:
        '200':
          description: A list of all tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsResponse'
  /threads/{thread_id}:
    get:
      summary: Get a specific email thread
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The email thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
  /events:
    get:
      summary: Server-Sent Events stream for real-time notifications
      description: >
        Long-lived SSE connection. Emits `new_mail` events when IDLE-triggered
        syncs find new messages, and `: heartbeat` comments every 30s.
      responses:
        '200':
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/NewMailEvent'
  /messages/{message_id}/attachments/{part_id}:
    get:
      summary: Download a message attachment
      description: >
        Streams the raw bytes of a MIME part. Content-Type and Content-Disposition
        headers are derived server-side from notmuch metadata.
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: string
        - name: part_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Raw attachment bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Message or attachment not found
  /threads/{thread_id}/tags:
    post:
      summary: Add or remove tags from an email thread
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagRequest'
      responses:
        '200':
          description: The updated tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'

components:
  schemas:
    SearchResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/NotmuchMailResult'
    ThreadResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
        thread:
          $ref: '#/components/schemas/ThreadContent'
    TagsResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
        tags:
          type: array
          items:
            type: string
    TagRequest:
      type: object
      properties:
        tags:
          type: string
    TagResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
    NewMailEvent:
      type: object
      properties:
        account:
          type: string
        total_new:
          type: integer
        messages:
          type: array
          items:
            $ref: '#/components/schemas/NewMailInfo'
    NewMailInfo:
      type: object
      properties:
        thread_id:
          type: string
        subject:
          type: string
        from:
          type: string
    NotmuchMailResult:
      type: object
      properties:
        thread_id:
          type: string
        subject:
          type: string
        from:
          type: string
        date:
          type: string
        timestamp:
          type: integer
        tags:
          type: string
    ThreadContent:
      type: object
      properties:
        thread_id:
          type: string
        subject:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ThreadMessage'
    ThreadMessage:
      type: object
      properties:
        id:
          type: string
        from:
          type: string
        to:
          type: string
        cc:
          type: string
        date:
          type: string
        timestamp:
          type: integer
        body:
          type: string
        html:
          type: string
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentInfo'
        tags:
          type: array
          items:
            type: string
    AttachmentInfo:
      type: object
      properties:
        part_id:
          type: integer
        filename:
          type: string
        content_type:
          type: string
        size:
          type: integer
        disposition:
          type: string
        content_id:
          type: string
