openapi: 3.0.0
info:
  title: Durian API
  version: 1.0.0
servers:
  - url: http://localhost:9723/api/v1
paths:
  /search:
    get:
      summary: Search for emails
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
        - name: enrich
          in: query
          description: Max number of threads to enrich with full content (0 = off)
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: A list of emails
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
  /tags:
    get:
      summary: List all known tags
      responses:
        '200':
          description: A list of all tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsResponse'
  /threads/{thread_id}:
    get:
      summary: Get a specific email thread
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The email thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
  /events:
    get:
      summary: Server-Sent Events stream for real-time notifications
      description: >
        Long-lived SSE connection. Emits `new_mail` events when IDLE-triggered
        syncs find new messages, and `: heartbeat` comments every 30s.
      responses:
        '200':
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/NewMailEvent'
  /messages/{message_id}/attachments/{part_id}:
    get:
      summary: Download a message attachment
      description: >
        Streams the raw bytes of a MIME part. Content-Type and Content-Disposition
        headers are derived server-side from stored message metadata.
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: string
        - name: part_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Raw attachment bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Message or attachment not found
  /contacts/search:
    get:
      summary: Search contacts by email or name
      parameters:
        - name: query
          in: query
          description: Prefix search on email/name
          schema:
            type: string
        - name: name
          in: query
          description: Exact name match (case-insensitive)
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Matching contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Contact'
        '400':
          description: Missing query or name parameter
        '503':
          description: Contacts database not available
  /contacts:
    get:
      summary: List contacts ordered by usage
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Contacts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Contact'
        '503':
          description: Contacts database not available
  /contacts/usage:
    post:
      summary: Increment usage count for emails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageRequest'
      responses:
        '200':
          description: Usage counts updated
        '400':
          description: Invalid request body
        '503':
          description: Contacts database not available
  /outbox/send:
    post:
      summary: Enqueue an email to the outbox for background sending
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutboxDraft'
      responses:
        '200':
          description: Email enqueued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: integer
                    format: int64
        '400':
          description: Invalid request (missing fields)
  /outbox:
    get:
      summary: List all outbox items
      responses:
        '200':
          description: Outbox items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OutboxEntry'
  /outbox/{id}:
    delete:
      summary: Delete an outbox item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Item deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '404':
          description: Item not found
  /threads/{thread_id}/tags:
    post:
      summary: Add or remove tags from an email thread
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagRequest'
      responses:
        '200':
          description: The updated tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'

components:
  schemas:
    SearchResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/MailSearchResult'
        threads:
          type: object
          description: Thread content keyed by thread ID (enriched search)
          additionalProperties:
            $ref: '#/components/schemas/ThreadContent'
    ThreadResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
        thread:
          $ref: '#/components/schemas/ThreadContent'
    TagsResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
        tags:
          type: array
          items:
            type: string
    TagRequest:
      type: object
      properties:
        tags:
          type: string
    TagResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
    NewMailEvent:
      type: object
      properties:
        account:
          type: string
        total_new:
          type: integer
        messages:
          type: array
          items:
            $ref: '#/components/schemas/NewMailInfo'
    NewMailInfo:
      type: object
      properties:
        thread_id:
          type: string
        subject:
          type: string
        from:
          type: string
    MailSearchResult:
      type: object
      properties:
        thread_id:
          type: string
        subject:
          type: string
        from:
          type: string
        date:
          type: string
        timestamp:
          type: integer
        tags:
          type: string
    ThreadContent:
      type: object
      properties:
        thread_id:
          type: string
        subject:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ThreadMessage'
    ThreadMessage:
      type: object
      properties:
        id:
          type: string
        from:
          type: string
        to:
          type: string
        cc:
          type: string
        date:
          type: string
        timestamp:
          type: integer
        body:
          type: string
        html:
          type: string
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentInfo'
        tags:
          type: array
          items:
            type: string
    Contact:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        last_used:
          type: string
          format: date-time
        usage_count:
          type: integer
        source:
          type: string
        created_at:
          type: string
          format: date-time
      required:
        - id
        - email
        - usage_count
        - source
        - created_at
    UsageRequest:
      type: object
      properties:
        emails:
          type: array
          items:
            type: string
      required:
        - emails
    OutboxDraft:
      type: object
      properties:
        from:
          type: string
        to:
          type: array
          items:
            type: string
        cc:
          type: array
          items:
            type: string
        bcc:
          type: array
          items:
            type: string
        subject:
          type: string
        body:
          type: string
        is_html:
          type: boolean
        in_reply_to:
          type: string
        references:
          type: string
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/OutboxAttachment'
      required:
        - from
        - to
        - subject
        - body
    OutboxAttachment:
      type: object
      properties:
        filename:
          type: string
        mime_type:
          type: string
        data_base64:
          type: string
      required:
        - filename
        - mime_type
        - data_base64
    OutboxEntry:
      type: object
      properties:
        id:
          type: integer
          format: int64
        subject:
          type: string
        to:
          type: string
        attempts:
          type: integer
        last_error:
          type: string
        created_at:
          type: integer
          format: int64
    OutboxUpdateEvent:
      type: object
      description: SSE event broadcast when an outbox item changes status
      properties:
        item_id:
          type: integer
          format: int64
        status:
          type: string
          enum: [sent, failed, queued]
        error:
          type: string
        subject:
          type: string
        to:
          type: string
    AttachmentInfo:
      type: object
      properties:
        part_id:
          type: integer
        filename:
          type: string
        content_type:
          type: string
        size:
          type: integer
        disposition:
          type: string
        content_id:
          type: string
