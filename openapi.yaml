openapi: 3.0.0
info:
  title: Durian API
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
paths:
  /search:
    get:
      summary: Search for emails
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: A list of emails
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
  /threads/{thread_id}:
    get:
      summary: Get a specific email thread
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The email thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
  /threads/{thread_id}/tags:
    post:
      summary: Add or remove tags from an email thread
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagRequest'
      responses:
        '200':
          description: The updated tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'

components:
  schemas:
    SearchResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/NotmuchMailResult'
    ThreadResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
        thread:
          $ref: '#/components/schemas/ThreadContent'
    TagRequest:
      type: object
      properties:
        tags:
          type: string
    TagResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
    NotmuchMailResult:
      type: object
      properties:
        thread_id:
          type: string
        subject:
          type: string
        from:
          type: string
        date:
          type: string
        timestamp:
          type: integer
        tags:
          type: string
    ThreadContent:
      type: object
      properties:
        thread_id:
          type: string
        subject:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ThreadMessage'
    ThreadMessage:
      type: object
      properties:
        id:
          type: string
        from:
          type: string
        to:
          type: string
        cc:
          type: string
        date:
          type: string
        timestamp:
          type: integer
        body:
          type: string
        html:
          type: string
        attachments:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
